categories:
  - name: About College
    questions:
      - text: What is Sphoorthy Engineering College?
        answer: Sphoorthy Engineering College is an AICTE-approved, autonomous institution established in 2004, located in Nadargul Village, Saroornagar Mandal, Hyderabad, Telangana.
      
      - text: Where is Sphoorthy Engineering College located?
        answer: Sphoorthy Engineering College is located in Nadargul Village, Saroornagar Mandal, Hyderabad, Telangana - 501510. It's a 25-acre campus that serves as an abode of learning and bonding.
      
      - text: What is the campus area?
        answer: Sphoorthy Engineering College has a 25-acre sprawling campus designed for academic excellence and student development.
      
      - text: When was the college established?
        answer: Sphoorthy Engineering College was established in 2004 and has been serving the educational needs of students for over two decades.
      
      - text: What accreditations does the college have?
        answer: Sphoorthy Engineering College is AICTE-approved, NAAC A Grade accredited, Autonomous Institution, and affiliated with JNTU Hyderabad.
      
      - text: What is NAAC accreditation?
        answer: NAAC (National Assessment and Accreditation Council) A Grade accreditation recognizes Sphoorthy's excellent academic standards and institutional quality.
      
      - text: How can I contact the college?
        answer: You can contact Sphoorthy Engineering College at +91 9392 11 9392, +91 99 666 31091, or email admissions@sphoorthyengg.ac.in
      
      - text: What is the college's contact email?
        answer: The admissions email for Sphoorthy Engineering College is admissions@sphoorthyengg.ac.in
      
      - text: What is the college address?
        answer: Nadargul Village, Saroornagar Mandal, Hyderabad, Telangana - 501510
      
      - text: Is the college autonomous?
        answer: Yes, Sphoorthy Engineering College is an autonomous institution affiliated with JNTU Hyderabad, allowing it greater academic flexibility and curriculum design freedom.

  - name: Leadership & Management
    questions:
