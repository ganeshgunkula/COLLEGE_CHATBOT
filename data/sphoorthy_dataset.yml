        answer: S. Chalama Reddy is the Chairman of Sphoorthy Engineering College. He holds a Master's degree in Mathematics and Education and has over 25 years of experience in the education sector as President of Thoma Educational Society.
      
      - text: Tell me about the Chairman?
        answer: S. Chalama Reddy (Chairman) has Master's in Mathematics and Education with 25+ years in education. He is the President of Thoma Educational Society and provides strategic leadership.
      
      - text: Who is the Secretary of the college?
        answer: S. Jagan Mohan Reddy is the Secretary and Correspondent of Sphoorthy Engineering College. He has been awarded the 'Visionary Leader in Engineering Education' by Times of India (2025) and 'Best Pioneer in Engineering Education' at ET Educational Leadership Summit (2024).
      
      - text: What awards has the Secretary received?
        answer: Secretary S. Jagan Mohan Reddy has received the 'Visionary Leader in Engineering Education Award' from Times of India (2025) and 'Best Pioneer in Engineering Education Award' from ET Educational Leadership Summit (2024).
      
      - text: Who is the Director of the college?
        answer: Dr. M.V.S. Ram Prasad is the Director of Sphoorthy Engineering College, leading academic operations and institutional development.
      
      - text: Who is the CEO of the college?
        answer: Mr. S. Holydhar Reddy serves as the Chief Executive Officer of Sphoorthy Engineering College.
      
      - text: Tell me about the management team?
        answer: Sphoorthy Engineering College is led by Chairman S. Chalama Reddy, Secretary S. Jagan Mohan Reddy, CEO Mr. S. Holydhar Reddy, and Director Dr. M.V.S. Ram Prasad. Together they provide visionary leadership.
      
      - text: What is the college's leadership structure?
        answer: The college operates under a strong leadership hierarchy with Chairman S. Chalama Reddy, Secretary and Correspondent S. Jagan Mohan Reddy (award winner in 2025), CEO Mr. S. Holydhar Reddy, and Director Dr. M.V.S. Ram Prasad.
      
      - text: Who leads the academic operations?
        answer: Dr. M.V.S. Ram Prasad as Director oversees academic operations and institutional governance at Sphoorthy Engineering College.
      
      - text: Tell me about the college's vision?
        answer: The college's vision is to create socially responsible engineers and leaders who contribute to national development and technological advancement through quality education and research.

